name: Codespell

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

jobs:
  codespell:
    name: Codespell spell checker

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Install dependencies
        run: sudo apt update -y && sudo apt install -y codespell

      - name: Run codespell
        # Devine's name is not misspelled
        # clen is a variable name
        # vor is a variable name
        # SHS is Secure Hash Standard
        run: codespell -L devine,clen,vor,shs
